  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "HJ OBSERVE",
    "alternateName": "汇金宽基 ETF 监测",
    "url": "https://yipeng-git.github.io/a-share-monitor/",
    "description": "跟踪宽基 ETF 场内份额日频变动与对应指数收盘价，用作国家队行为代理观察。",
    "inLanguage": "zh-CN"
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body>
  <div class="page">
    <header class="top">
      <div class="brand">
        <h1 class="brand-mark">HJ OBSERVE</h1>
        <span class="brand-sub">宽基 ETF</span>
      </div>
      <div class="meta" id="metaLine">加载中…</div>
    </header>

    <p class="seo-intro">
      日频监测宽基 ETF 场内总份额（申赎合计）与沪深300、上证50、中证500、中证1000、科创50、创业板等对应指数走势，用作国家队 / 汇金行为代理观察；非精确持仓。
    </p>

    <nav class="tabs group-tabs" id="groupTabs" aria-label="指数组"></nav>

    <section class="kpi" id="kpi"></section>

    <section class="panel">
      <div class="panel-bar">
        <div class="tabs etf-tabs" id="etfTabs"></div>
        <div class="tabs range-tabs" id="rangeTabs">
          <button type="button" data-range="1M">1M</button>
          <button type="button" data-range="3M">3M</button>
          <button type="button" data-range="1Y" class="active">1Y</button>
          <button type="button" data-range="ALL">ALL</button>
        </div>
      </div>
      <div id="mainChart" class="chart main-chart"></div>
    </section>

    <section class="panel" id="subPanel">
      <div class="panel-label">分项份额</div>
      <div id="subChart" class="chart sub-chart"></div>
    </section>

    <section class="panel">
      <div class="panel-label">最近变动</div>
      <div class="table-wrap">
        <table id="changeTable">
          <thead>
            <tr>
              <th>日期</th>
              <th>份额(亿份)</th>
              <th>日变动</th>
              <th>指数收盘</th>
              <th>涨跌%</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <footer class="foot">
      总份额为场内申赎合计（万份口径转展示），用作国家队行为代理指标；非汇金精确持仓。份额通常 T+1。
      含上交所（可按日回溯）与深交所（官网日频接口，单次约 6 个月窗口，可分段回填）。合计时按当日可得标的加总。
    </footer>
  </div>
  <script src="./app.js"></script>
</body>
</html>
